<!DOCTYPE html>
<html>
  <head>
    <title>Calculator</title>
    <link rel="stylesheet" href="Calculator.css">
     
  </head>
  <body>
    <p>
    <button onclick="updateCalculation('1');">
      1
    </button>
    <button onclick="updateCalculation('2');">
      2
    </button>
    <button onclick="updateCalculation('3');">
      3
    </button>
    <button class="symb" onclick="updateCalculation('+');">
      +
    </button>
    </p>
    <p>
    <button onclick="updateCalculation('4');">
      4
    </button>
    <button onclick="updateCalculation('5');">
      5
    </button>
    <button onclick="updateCalculation('6');">
      6
    </button>
    <button class="symb" onclick="updateCalculation('-');">
      -
    </button>
    </p>
    <p>
    <button onclick="updateCalculation('7');">
      7
    </button>
    <button onclick="updateCalculation('8');">
      8
    </button>
    <button onclick="updateCalculation('9');">
      9
    </button>
    <button  class="symb" onclick="updateCalculation('*');">
      *
    </button>
    </p>
    <p>
    <button onclick="updateCalculation('0');">
      0
    </button>
    <button onclick="updateCalculation('.');">
      .
    </button>
    <button onclick="calculation=eval(calculation);displayCal();
    localStorage.setItem('calculation',JSON.stringify(calculation));">
      =
    </button>
    <button  class="symb" onclick="updateCalculation('/ ')">
      /
    </button>
</p><br><br>
<button onclick="calculation=' ';console.log('Cleared');localStorage.setItem('calculation',JSON.stringify(calculation));displayCal();">
  clear
</button>
    <p class="Display-cal"></p>
    <script src="Calculator.js"></script>
  </body>
</html>
